version: "3.8"

# ============================================================
# XNK Microservices - Docker Compose
# Tất cả config đọc từ file .env (copy từ .env.example)
# cp .env.example .env  →  docker-compose up -d
# ============================================================

services:
  mysql:
    image: mysql:8.0
    container_name: xnk-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p${DB_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xnk-net

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: xnk-auth-service
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
    networks:
      - xnk-net

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: xnk-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - agent-service
      - product-service
      - supplier-service
      - order-service
      - payment-service
    environment:
      SERVICES_AUTH-SERVICE: http://auth-service:8085
      SERVICES_AGENT-SERVICE: http://agent-service:8081
      SERVICES_PRODUCT-SERVICE: http://product-service:8082
      SERVICES_SUPPLIER-SERVICE: http://supplier-service:8086
      SERVICES_ORDER-SERVICE: http://order-service:8083
      SERVICES_PAYMENT-SERVICE: http://payment-service:8084
    networks:
      - xnk-net

  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: xnk-agent-service
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/agent_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    networks:
      - xnk-net

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: xnk-product-service
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/product_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    networks:
      - xnk-net

  supplier-service:
    build:
      context: ./supplier-service
      dockerfile: Dockerfile
    container_name: xnk-supplier-service
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/supplier_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    networks:
      - xnk-net

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: xnk-order-service
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SERVICES_AGENT-SERVICE: http://agent-service:8081
      SERVICES_PRODUCT-SERVICE: http://product-service:8082
    networks:
      - xnk-net

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: xnk-payment-service
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SERVICES_ORDER-SERVICE: http://order-service:8083
      SERVICES_AGENT-SERVICE: http://agent-service:8081
    networks:
      - xnk-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xnk-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - xnk-net

volumes:
  mysql_data:

networks:
  xnk-net:
    driver: bridge
