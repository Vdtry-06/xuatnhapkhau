# ============================================================
# Secret: xnk-secrets
# Chứa thông tin NHẠY CẢM — KHÔNG commit giá trị thật lên Git
# Giá trị phải encode base64: echo -n "yourvalue" | base64
#
# Giá trị mẫu bên dưới (dev only):
#   DB_USERNAME = xnk         → eG5r
#   DB_PASSWORD = xnk@Prod#2024 → eG5rQFByb2QjMjAyNA==
#   JWT_SECRET  = (256-bit key) → eG5rLWp3dC1zdXBlci1zZWNyZXQta2V5LW1pbi0yNTYtYml0cy1wcm9kdWN0aW9u
#
# Khi deploy production: dùng Vault / Sealed Secrets / External Secrets Operator
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: xnk-secrets
  namespace: default
  labels:
    app: xnk
    component: secrets
type: Opaque
data:
  # echo -n "root" | base64
  DB_USERNAME: cm9vdA==
  # echo -n "root" | base64  ← đổi thành password thật khi production
  DB_PASSWORD: cm9vdA==
  # echo -n "xnk-jwt-super-secret-key-min-256-bits-production" | base64
  JWT_SECRET: eG5rLWp3dC1zdXBlci1zZWNyZXQta2V5LW1pbi0yNTYtYml0cy1wcm9kdWN0aW9u
