# ============================================================
# Services + PVC + Ingress
# kubectl apply -f k8s/services/all-services.yaml
# ============================================================

# ── PersistentVolumeClaim cho MySQL ───────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# ── MySQL Service (ClusterIP - chỉ internal) ──────────────────
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: default
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
---
# ── Auth Service ──────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: default
spec:
  selector:
    app: auth-service
  ports:
    - port: 8085
      targetPort: 8085
  type: ClusterIP
---
# ── API Gateway (NodePort để expose ra ngoài cluster) ─────────
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: default
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
---
# ── Agent Service ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: default
spec:
  selector:
    app: agent-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
---
# ── Product Service ───────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: default
spec:
  selector:
    app: product-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
---
# ── Supplier Service ──────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: supplier-service
  namespace: default
spec:
  selector:
    app: supplier-service
  ports:
    - port: 8086
      targetPort: 8086
  type: ClusterIP
---
# ── Order Service ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: default
spec:
  selector:
    app: order-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
---
# ── Payment Service ───────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: default
spec:
  selector:
    app: payment-service
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP
---
# ── Frontend (NodePort) ───────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: default
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30000
  type: NodePort
---
# ── Ingress (nếu dùng ingress-nginx controller) ───────────────
# Trỏ xnk.example.com → frontend, xnk.example.com/api → api-gateway
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xnk-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: xnk.example.com   # ← đổi thành domain thật khi production
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
