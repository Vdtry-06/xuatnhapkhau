server:
  port: 8085

spring:
  application:
    name: auth-service
  datasource:
    # Đọc từ env var — K8s inject qua ConfigMap + Secret
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# JWT config — đọc từ env (K8s Secret)
jwt:
  secret: ${JWT_SECRET:xnk-default-dev-secret-change-in-production-min-256bits}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health, info
